<link rel="stylesheet" href="./arcane/css/primitives.css?v=1">
<style>
    :host{display:block;height:100%;min-height:18rem;--terminal-bg:#07110f;--terminal-fg:#d7f6df;--terminal-muted:#6f9b82;--terminal-accent:#63f2a2;--terminal-danger:#ff6b7a;--terminal-font:ui-monospace,"Cascadia Code","SFMono-Regular",Consolas,monospace;--terminal-font-size:14px;--terminal-line-height:1.55;--terminal-opacity:1}
    *{box-sizing:border-box}.workspace{background:color-mix(in srgb,var(--terminal-bg) calc(var(--terminal-opacity)*100%),transparent);border:1px solid color-mix(in srgb,var(--terminal-accent) 20%,transparent);border-radius:.85rem;color:var(--terminal-fg);display:grid;grid-template-rows:auto auto minmax(0,1fr) auto;height:100%;overflow:hidden;box-shadow:0 1.5rem 5rem rgba(0,0,0,.28)}
    .tabs,.toolbar{align-items:center;background:color-mix(in srgb,var(--terminal-bg) 88%,white 12%);display:flex;gap:.35rem;min-width:0;padding:.45rem .65rem}.tabs{border-bottom:1px solid color-mix(in srgb,var(--terminal-fg) 10%,transparent)}
    .tab{align-items:center;background:transparent;border:1px solid transparent;border-radius:.45rem;color:var(--terminal-muted);display:flex;font:600 .78rem/1 var(--terminal-font);gap:.35rem;max-width:13rem;padding:.55rem .65rem}.tab[aria-selected="true"]{background:color-mix(in srgb,var(--terminal-accent) 12%,transparent);border-color:color-mix(in srgb,var(--terminal-accent) 30%,transparent);color:var(--terminal-fg)}.tab-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.tab-close{border:0;background:transparent;color:inherit;cursor:pointer;padding:0 .15rem}.new-session,.tool{background:transparent;border:1px solid transparent;border-radius:.4rem;color:var(--terminal-muted);cursor:pointer;font:600 .78rem/1 var(--terminal-font);padding:.55rem}.new-session:hover,.tool:hover{border-color:color-mix(in srgb,var(--terminal-accent) 25%,transparent);color:var(--terminal-fg)}
    .toolbar{border-bottom:1px solid color-mix(in srgb,var(--terminal-fg) 8%,transparent);justify-content:flex-end}.connection{align-items:center;display:flex;gap:.4rem;margin-right:auto;color:var(--terminal-muted);font:600 .72rem/1 var(--terminal-font);text-transform:uppercase;letter-spacing:.08em}.connection::before{background:var(--terminal-muted);border-radius:50%;content:"";height:.48rem;width:.48rem}.connection[data-state="running"]::before{background:var(--terminal-accent);box-shadow:0 0 .7rem var(--terminal-accent)}.connection[data-state="error"]::before,.connection[data-state="exited"]::before{background:var(--terminal-danger)}
    .search{background:var(--terminal-bg);border:1px solid color-mix(in srgb,var(--terminal-fg) 16%,transparent);border-radius:.4rem;color:var(--terminal-fg);font:inherit;max-width:15rem;padding:.4rem .55rem}.search[hidden]{display:none}
    .output{font:var(--terminal-font-size)/var(--terminal-line-height) var(--terminal-font);overflow:auto;overscroll-behavior:contain;padding:1rem 1.1rem;scrollbar-color:color-mix(in srgb,var(--terminal-accent) 30%,transparent) transparent;white-space:pre-wrap;word-break:break-word}.entry{min-height:1em}.entry.command{color:var(--terminal-accent);font-weight:650}.entry.system{color:var(--terminal-muted)}.entry.error{color:var(--terminal-danger)}mark{background:color-mix(in srgb,var(--terminal-accent) 38%,transparent);color:inherit}
    .prompt{align-items:flex-start;border-top:1px solid color-mix(in srgb,var(--terminal-fg) 10%,transparent);display:grid;font:var(--terminal-font-size)/var(--terminal-line-height) var(--terminal-font);gap:.6rem;grid-template-columns:auto minmax(0,1fr);padding:.75rem 1.1rem}.prompt-label{color:var(--terminal-accent);font-weight:800;padding-top:.34rem}.input{background:transparent;border:0;color:var(--terminal-fg);font:inherit;min-height:2rem;outline:0;padding:.3rem 0;resize:none;width:100%}.input::placeholder{color:var(--terminal-muted)}
    .ansi-bold{font-weight:800}.ansi-dim{opacity:.65}.ansi-italic{font-style:italic}.ansi-underline{text-decoration:underline}.ansi-red,.ansi-bright-red{color:#ff6b7a}.ansi-green,.ansi-bright-green{color:#63f2a2}.ansi-yellow,.ansi-bright-yellow{color:#ffd166}.ansi-blue,.ansi-bright-blue{color:#79b8ff}.ansi-magenta,.ansi-bright-magenta{color:#d2a8ff}.ansi-cyan,.ansi-bright-cyan{color:#72e9ee}.ansi-black{color:#87938d}.ansi-white,.ansi-bright-white{color:#fff}
    @media(max-width:44rem){.toolbar .tool[data-secondary]{display:none}.workspace{border-radius:0}.output{padding:.8rem}.prompt{padding:.65rem .8rem}}
</style>
<section class="workspace" aria-label="Terminal workspace">
    <nav class="tabs" id="tabs" aria-label="Terminal sessions"></nav>
    <div class="toolbar">
        <span class="connection" id="connection" data-state="starting">Starting</span>
        <input class="search" id="search" type="search" placeholder="Find in output" aria-label="Find in terminal output" hidden>
        <button class="tool" id="find" type="button" title="Find (Ctrl+Shift+F)">Find</button>
        <button class="tool" id="copy" data-secondary type="button" title="Copy selected text">Copy</button>
        <button class="tool" id="clear" type="button" title="Clear terminal">Clear</button>
        <button class="tool" id="interrupt" type="button" title="Interrupt process (Ctrl+C)">Ctrl+C</button>
        <button class="tool" id="settings" type="button" title="Terminal settings">Settings</button>
    </div>
    <div class="output" id="output" role="log" aria-live="polite" aria-label="Terminal output" tabindex="0"></div>
    <form class="prompt" id="prompt"><label class="prompt-label" id="promptLabel" for="input">arcane ❯</label><textarea class="input" id="input" rows="1" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Enter a command"></textarea></form>
</section>
<script type="module">
    const {parseAnsi,stripAnsi}=await import('../modules/AnsiText.js');
    const host=this,root=host.shadowRoot;
    const tabs=root.querySelector('#tabs'),output=root.querySelector('#output'),input=root.querySelector('#input'),prompt=root.querySelector('#prompt'),promptLabel=root.querySelector('#promptLabel'),connection=root.querySelector('#connection'),search=root.querySelector('#search');
    const sessions=new Map();let activeId='',history=[],historyIndex=0,completions=[];
    host.configure=configure;host.addSession=addSession;host.removeSession=removeSession;host.activateSession=activateSession;host.append=append;host.clear=clear;host.setState=setState;host.setTheme=setTheme;host.focus=()=>input.focus();host.ready=true;
    prompt.addEventListener('submit',event=>{event.preventDefault();submit();});
    input.addEventListener('keydown',event=>{
        if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();submit();}
        else if(event.key==='ArrowUp'){event.preventDefault();recall(-1);}
        else if(event.key==='ArrowDown'){event.preventDefault();recall(1);}
        else if(event.key==='Tab'){event.preventDefault();complete();}
        else if(event.key.toLowerCase()==='c'&&event.ctrlKey){const selected=globalThis.getSelection?.()?.toString();if(!selected){event.preventDefault();emit('terminal-interrupt',{sessionId:activeId});}}
        else if(event.key.toLowerCase()==='f'&&event.ctrlKey&&event.shiftKey){event.preventDefault();toggleSearch(true);}
        requestAnimationFrame(resizeInput);
    });
    root.querySelector('#find').onclick=()=>toggleSearch();root.querySelector('#clear').onclick=()=>clear();root.querySelector('#interrupt').onclick=()=>emit('terminal-interrupt',{sessionId:activeId});root.querySelector('#settings').onclick=()=>emit('terminal-settings');
    root.querySelector('#copy').onclick=()=>navigator.clipboard?.writeText(globalThis.getSelection?.()?.toString()||'');
    search.addEventListener('input',render);search.addEventListener('keydown',event=>{if(event.key==='Escape')toggleSearch(false);});
    function configure(options={}){history=Array.from(options.history||[]);historyIndex=history.length;completions=Array.from(options.completions||[]);promptLabel.textContent=String(options.prompt||'arcane ❯');if(options.theme)setTheme(options.theme);return host;}
    function addSession(session){sessions.set(session.id,{...session,entries:session.entries||[]});if(!activeId)activeId=session.id;renderTabs();render();setState(session.state||'starting');}
    function removeSession(id){sessions.delete(id);if(activeId===id)activeId=sessions.keys().next().value||'';renderTabs();render();}
    function activateSession(id){if(!sessions.has(id))return;activeId=id;renderTabs();render();setState(sessions.get(id).state||'running');input.focus();emit('terminal-session-select',{sessionId:id});}
    function append(text,kind='output',sessionId=activeId){const session=sessions.get(sessionId);if(!session)return;session.entries.push({text:String(text??''),kind});if(session.entries.length>4000)session.entries.splice(0,session.entries.length-4000);if(sessionId===activeId)render(true);}
    function clear(sessionId=activeId){const session=sessions.get(sessionId);if(session)session.entries=[];render();emit('terminal-clear',{sessionId});}
    function setState(state,id=activeId){const session=sessions.get(id);if(session)session.state=state;if(id===activeId){connection.dataset.state=state;connection.textContent=state;}}
    function setTheme(theme={}){for(const [key,value] of Object.entries(theme)){const name=`--terminal-${key.replace(/[A-Z]/g,match=>`-${match.toLowerCase()}`)}`;host.style.setProperty(name,String(value));}}
    function submit(){const line=input.value.trimEnd();if(!line.trim())return;if(history.at(-1)!==line)history.push(line);historyIndex=history.length;append(`${promptLabel.textContent} ${line}\n`,'command');input.value='';resizeInput();emit('terminal-submit',{sessionId:activeId,line,history:[...history]});}
    function recall(direction){if(!history.length)return;historyIndex=Math.max(0,Math.min(history.length,historyIndex+direction));input.value=historyIndex===history.length?'':history[historyIndex];resizeInput();input.setSelectionRange(input.value.length,input.value.length);}
    function complete(){const prefix=input.value.split(/\s/).at(-1).toLowerCase();const matches=completions.filter(value=>value.toLowerCase().startsWith(prefix));if(matches.length===1)input.value=input.value.slice(0,-prefix.length)+matches[0];else if(matches.length>1)append(`${matches.join('    ')}\n`,'system');resizeInput();}
    function renderTabs(){const fragment=document.createDocumentFragment();for(const session of sessions.values()){const button=document.createElement('button');button.className='tab';button.type='button';button.setAttribute('role','tab');button.setAttribute('aria-selected',String(session.id===activeId));button.innerHTML=`<span class="tab-label"></span><span class="tab-close" aria-label="Close session">×</span>`;button.querySelector('.tab-label').textContent=session.title||session.shell||'Terminal';button.onclick=event=>{if(event.target.classList.contains('tab-close'))emit('terminal-session-close',{sessionId:session.id});else activateSession(session.id);};fragment.append(button);}const add=document.createElement('button');add.className='new-session';add.type='button';add.textContent='＋';add.title='New terminal session';add.onclick=()=>emit('terminal-session-new');fragment.append(add);tabs.replaceChildren(fragment);}
    function render(stick=false){const session=sessions.get(activeId);const atEnd=output.scrollHeight-output.scrollTop-output.clientHeight<48;const term=search.value.toLowerCase();const fragment=document.createDocumentFragment();for(const entry of session?.entries||[]){const row=document.createElement('div');row.className=`entry ${entry.kind||'output'}`;renderText(row,entry.text,term);fragment.append(row);}output.replaceChildren(fragment);if(stick&&(atEnd||!output.scrollTop))output.scrollTop=output.scrollHeight;}
    function renderText(row,text,term){const clean=stripAnsi(text);if(!term){for(const token of parseAnsi(text)){const span=document.createElement('span');span.textContent=token.text;const classes=[];if(token.style.bold)classes.push('ansi-bold');if(token.style.dim)classes.push('ansi-dim');if(token.style.italic)classes.push('ansi-italic');if(token.style.underline)classes.push('ansi-underline');if(token.style.foreground&&!token.style.foreground.startsWith('index-'))classes.push(`ansi-${token.style.foreground}`);span.className=classes.join(' ');row.append(span);}return;}let cursor=0,index=clean.toLowerCase().indexOf(term);while(index>=0){row.append(document.createTextNode(clean.slice(cursor,index)));const mark=document.createElement('mark');mark.textContent=clean.slice(index,index+term.length);row.append(mark);cursor=index+term.length;index=clean.toLowerCase().indexOf(term,cursor);}row.append(document.createTextNode(clean.slice(cursor)));}
    function toggleSearch(force){search.hidden=force===undefined?!search.hidden:!force;if(!search.hidden)search.focus();else{search.value='';render();input.focus();}}
    function resizeInput(){input.style.height='auto';input.style.height=`${Math.min(input.scrollHeight,160)}px`;}
    function emit(type,detail={}){host.dispatchEvent(new CustomEvent(type,{bubbles:true,composed:true,detail}));}
    host.dispatchEvent(new CustomEvent('terminal-workspace-ready',{bubbles:true,composed:true}));
</script>
