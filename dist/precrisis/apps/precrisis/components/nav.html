<style>
    .logo-container {
        padding: 0em 1em;
        color:var(--silver);
    }

    .logo {
        height: 9em;
        -webkit-app-region: no-drag;
        cursor: pointer;
    }

    nav>ul {
        list-style: none;
        word-wrap: break-word;
        padding: 0em 1em;
        margin: 0;
    }

    nav>ul>li {
        margin: 1.5em 0;
    }

    nav a {
        border-radius:.4em;
        color: var(--platinum);
        display:block;
        padding:.35em .5em;
        text-decoration: none;
        transition:background-color 180ms,color 180ms;
    }

    nav a:hover,
    nav a[aria-current="page"] {
        background:var(--secondary-color);
        color:var(--text-color);
    }

    nav aside {
        position: absolute;
        bottom: 1em;
        left: 1em;
        color: var(--gunmetal-light);
        text-align: center;
    }
    
    /* hide icons by default, show labels */
    nav .icon {
      display: none;
      font-size: 1.2em;
      padding:.7em .5em;
    }
    nav .label {
      display: inline;
    }

    #user-photo {
        height: 70px;
        width: 70px;
        padding: 0em 1em;
        border-radius: 50%;
    }
    
    /* single media‐query to collapse at 48em */
    @media (max-width: 48em) {
        /* 2) collapse the nav width and hide its header text */
        .logo-container h2 {
            display: none;
        }
        
        /* 3) center icons, hide labels */
        nav ul {
            padding: 1rem 0;
        }
        nav>ul>li {
            margin: 0;
        }
        nav a {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        nav .label {
            display: none;
        }
        nav .icon {
            display: inline-block;
        }
    }

</style>

<script type="module">
    const host=this;
    const shadowRoot=host.shadowRoot;
    const nav=shadowRoot.querySelector('nav');
    const currentPath=new URL(window.location.href).pathname;

    nav.querySelectorAll('a').forEach(
        link=>{
            if(new URL(link.href).pathname===currentPath){
                link.setAttribute('aria-current','page');
            }
        }
    );
    
    nav.addEventListener(
        'click',
        async (e)=>{
            if(e.target!==host){
                return;
            }

            nav.classList.toggle('mini')
        }
    )
</script>
