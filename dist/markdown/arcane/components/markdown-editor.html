<link rel="stylesheet" href="./arcane/css/layout.css?v=3">
<style>
    :host{
        display:block;
        height:100%;
        min-height:0;
    }

    .markdown-editor{
        display:grid;
        gap:.75em;
        grid-template-rows:auto minmax(8em,1fr) auto minmax(10em,1fr) auto;
        height:100%;
        min-height:0;
    }

    .entry-title,
    .entry-markdown{
        box-sizing:border-box;
        margin:0;
        width:100%;
    }

    .preview{
        background:var(--background);
        border:1px solid var(--border-color);
        border-radius:.5em;
        overflow:auto;
        padding:1em;
    }

    .preview:empty::before{
        content:attr(data-empty-label);
        opacity:.55;
    }

    .toolbar,
    .actions{
        display:flex;
        flex-wrap:wrap;
        gap:.35em;
    }

    .toolbar button,
    .actions button{
        margin:0;
    }

    .entry-markdown{
        font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        min-height:10em;
        resize:vertical;
    }

    .actions{
        align-items:center;
        justify-content:flex-end;
    }

    .status{
        margin-right:auto;
    }

    .hidden{
        display:none;
    }
</style>

<section class="markdown-editor">
    <input id="entryTitle" class="entry-title" type="text">
    <section id="preview" class="preview"></section>
    <section id="toolbar" class="toolbar"></section>
    <textarea id="entryMarkdown" class="entry-markdown"></textarea>
    <section class="actions">
        <span id="status" class="status" aria-live="polite"></span>
        <button id="save" type="button" disabled></button>
    </section>
</section>

<script type="module">
    const host=this;
    const componentURL=new URL(
        host.getAttribute('href')||'./arcane/components/markdown-editor.html',
        document.baseURI
    );
    const moduleURL=name=>new URL(`../modules/${name}`,componentURL).href;
    const {default:MD}=await import(moduleURL('MD.js?v=2'));
    const {
        applyMarkdownFormat,
        normalizeMarkdownOptions
    }=await import(moduleURL('ComponentContracts.js'));
    const titleInput=host.shadowRoot.querySelector('#entryTitle');
    const preview=host.shadowRoot.querySelector('#preview');
    const toolbar=host.shadowRoot.querySelector('#toolbar');
    const textarea=host.shadowRoot.querySelector('#entryMarkdown');
    const saveButton=host.shadowRoot.querySelector('#save');
    const status=host.shadowRoot.querySelector('#status');

    let previewFrame=0;
    let options=normalizeMarkdownOptions(optionsFromDataset());

    host.clear=clear;
    host.configure=configure;
    host.focus=()=>textarea.focus();
    host.saveEntry=saveEntry;

    Object.defineProperties(
        host,
        {
            entryTitle:{
                get:()=>titleInput.value,
                set:value=>setTitle(value)
            },
            options:{get:getOptions,set:configure},
            value:{get:()=>textarea.value,set:setValue}
        }
    );

    textarea.addEventListener('input',contentChanged);
    titleInput.addEventListener('input',contentChanged);
    toolbar.addEventListener('click',formatMarkdown);
    saveButton.addEventListener('click',saveEntry);

    function optionsFromDataset(){
        const dataset=host.dataset||{};
        const mapped={};
        const fields=[
            'bodyPlaceholder',
            'previewLabel',
            'saveLabel',
            'titlePlaceholder',
            'toolbarLabel'
        ];
        for(const field of fields){
            if(dataset[field]!==undefined){
                mapped[field]=dataset[field];
            }
        }
        for(const field of [
            'clearOnSave',
            'readOnly',
            'showPreview',
            'showSave',
            'showTitle',
            'showToolbar'
        ]){
            if(dataset[field]!==undefined){
                mapped[field]=dataset[field]==='true';
            }
        }
        return mapped;
    }

    function configure(input={}){
        const setInitialValue=Object.prototype.hasOwnProperty.call(
            input||{},
            'initialValue'
        );
        const setInitialTitle=Object.prototype.hasOwnProperty.call(
            input||{},
            'initialTitle'
        );
        options=normalizeMarkdownOptions(input,options);
        renderOptions();
        if(setInitialTitle){
            titleInput.value=options.initialTitle;
        }
        if(setInitialValue){
            textarea.value=options.initialValue;
        }
        updatePreview();
        return getOptions();
    }

    function renderOptions(){
        titleInput.placeholder=options.labels.titlePlaceholder;
        textarea.placeholder=options.labels.bodyPlaceholder;
        preview.setAttribute('aria-label',options.labels.preview);
        preview.dataset.emptyLabel=options.labels.preview;
        toolbar.setAttribute('aria-label',options.labels.toolbar);
        saveButton.innerText=options.labels.save;
        titleInput.classList.toggle('hidden',!options.showTitle);
        preview.classList.toggle('hidden',!options.showPreview);
        toolbar.classList.toggle('hidden',!options.showToolbar);
        saveButton.classList.toggle('hidden',!options.showSave);
        titleInput.readOnly=options.readOnly;
        textarea.readOnly=options.readOnly;
        renderToolbar();
        syncSaveButton();
    }

    function renderToolbar(){
        const fragment=document.createDocumentFragment();
        for(const format of options.formats){
            const button=document.createElement('button');
            button.type='button';
            button.dataset.format=format.id;
            button.title=format.title;
            button.innerText=format.label;
            button.disabled=options.readOnly;
            fragment.append(button);
        }
        toolbar.replaceChildren(fragment);
    }

    function contentChanged(){
        schedulePreview();
        const detail={
            markdown:textarea.value,
            title:titleInput.value
        };
        host.dispatchEvent(
            new CustomEvent(
                'markdown-editor-change',
                {bubbles:true,composed:true,detail}
            )
        );
        if(options.onChange){
            Promise.resolve(options.onChange(detail)).catch(
                error=>console.error('Markdown change callback failed:',error)
            );
        }
    }

    function schedulePreview(){
        if(previewFrame){
            cancelAnimationFrame(previewFrame);
        }
        previewFrame=requestAnimationFrame(updatePreview);
    }

    function updatePreview(){
        if(previewFrame){
            cancelAnimationFrame(previewFrame);
        }
        previewFrame=0;
        preview.innerHTML=new MD(textarea.value).safeRendered;
        preview.querySelectorAll('a').forEach(
            link=>{
                link.target='_blank';
                link.rel='noopener noreferrer';
            }
        );
    }

    function formatMarkdown(event){
        if(options.readOnly){
            return;
        }
        const button=event.target.closest('[data-format]');
        const format=options.formats.find(
            candidate=>candidate.id===button?.dataset.format
        );
        if(!button||!format){
            return;
        }

        const result=applyMarkdownFormat(
            textarea.value,
            textarea.selectionStart,
            textarea.selectionEnd,
            format
        );
        textarea.value=result.value;
        textarea.focus();
        textarea.setSelectionRange(result.selectionStart,result.selectionEnd);
        contentChanged();
    }

    async function saveEntry(){
        if(options.readOnly||!options.showSave){
            return false;
        }
        const markdown=textarea.value;
        const entryTitle=titleInput.value.trim();
        if(!markdown.trim()){
            status.innerText=options.labels.emptyError;
            textarea.focus();
            return false;
        }

        const save=options.onSave||(
            typeof host.save==='function'?host.save.bind(host):null
        );
        if(!save){
            status.innerText=options.labels.unavailable;
            return false;
        }

        saveButton.disabled=true;
        status.innerText=options.labels.saving;
        try{
            await save({title:entryTitle,markdown});
            if(options.clearOnSave){
                clear();
            }
            status.innerText=options.labels.saved;
            host.dispatchEvent(
                new CustomEvent(
                    'markdown-editor-saved',
                    {
                        bubbles:true,
                        composed:true,
                        detail:{title:entryTitle,markdown}
                    }
                )
            );
            return true;
        }catch(error){
            status.innerText=options.labels.saveError;
            console.error('Unable to save Markdown content:',error);
            return false;
        }finally{
            syncSaveButton();
        }
    }

    function clear(){
        titleInput.value='';
        textarea.value='';
        updatePreview();
        return true;
    }

    function setValue(value=''){
        textarea.value=`${value??''}`;
        updatePreview();
        return textarea.value;
    }

    function setTitle(value=''){
        titleInput.value=`${value??''}`;
        return titleInput.value;
    }

    function syncSaveButton(){
        saveButton.disabled=options.readOnly||!options.showSave;
    }

    function getOptions(){
        return {
            ...options,
            labels:{...options.labels},
            formats:options.formats.map(format=>({...format}))
        };
    }

    renderOptions();
    titleInput.value=options.initialTitle;
    textarea.value=options.initialValue;
    updatePreview();
    status.innerText='';
    host.ready=true;
    host.dispatchEvent(
        new CustomEvent(
            'markdown-editor-ready',
            {bubbles:true,composed:true}
        )
    );
</script>
