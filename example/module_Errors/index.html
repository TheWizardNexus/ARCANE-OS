<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>PreCrisis.AI Errors Module Example</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />

        <base href="/" />

        <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./img/favicon.png" type="image/png">

        <!-- Styles -->
        <link rel="stylesheet" href="./css/layout.css">
        
        <script type="module" src="./modules/Errors.js"></script>
        <script type="module" src="./modules/HTMLImport.js"></script>
    </head>

    <body>
        <html-import class="header" href="./components/header.html"></html-import>
        <html-import class="nav" href="./components/nav.html"></html-import>
        <html-import class="modal" href="./components/modal.html"></html-import>

        <main class="contents">
            <h2>Open Console and Click Buttons</h2>
            <button id="btn-throw-error">Error</button>
            <button id="btn-reject-promise">Reject</button>
        </main>

        <script>
            document.getElementById('btn-throw-error').addEventListener('click', () => {
                // This will be caught by window.onerror / Errors.onError
                throw Error('Example synchronous error');
            });

            document.getElementById('btn-reject-promise').addEventListener('click', () => {
                // This creates an unhandled rejected promise, caught by Errors.onRejection
                Promise.reject(Error('Example unhandled rejection'));
            });
        </script>
    </body>
</html>
