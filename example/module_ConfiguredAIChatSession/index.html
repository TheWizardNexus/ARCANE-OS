<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Configured AI chat session example</title>
    <link rel="stylesheet" href="../../arcane/css/theme.css">
    <link rel="stylesheet" href="../../arcane/css/primitives.css">
    <script type="module" src="../../arcane/modules/ThemeBootstrap.js"></script>
</head>
<body>
    <main>
        <h1>Configured AI chat session</h1>
        <form id="chat-form">
            <label for="message">Ask about the synthetic catalog</label>
            <input id="message" name="message" value="Which sample is available?" required>
            <button type="submit">Send</button>
        </form>
        <pre id="result" aria-live="polite"></pre>
    </main>
    <script type="module">
        import ConfiguredAIChatSession from '../../arcane/modules/ConfiguredAIChatSession.js';

        const catalog='The synthetic catalog contains one sample named Aurora.';
        const session=new ConfiguredAIChatSession({
            systemPrompt:'Answer only from the supplied synthetic context.',
            contextBuilder:async()=>catalog,
            request:{model:'synthetic-model'},
            chat:async request=>({
                provider:'synthetic',
                model:request.model,
                message:{role:'assistant',content:'The available sample is Aurora.'},
                done:true,
                doneReason:'stop',
                promptEvalCount:request.messages.length,
                evalCount:6,
            }),
        });

        const form=document.querySelector('#chat-form');
        const result=document.querySelector('#result');
        form.addEventListener('submit',async event=>{
            event.preventDefault();
            const response=await session.send(form.elements.message.value);
            result.textContent=JSON.stringify({response,history:session.history()},null,2);
        });
    </script>
</body>
</html>
