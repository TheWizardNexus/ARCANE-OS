<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <base href="../../">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Arcane theme components example</title>
    <link rel="stylesheet" href="./arcane/css/theme.css?v=1">
    <link rel="stylesheet" href="./arcane/css/primitives.css?v=1">
    <style>
        :root{font:16px/1.5 system-ui,sans-serif}
        body{margin:0}main{display:grid;gap:1rem;margin:auto;max-width:64rem;padding:2rem}.demo-bar{align-items:center;background:var(--primary-color);color:var(--button-text-color);display:flex;justify-content:space-between;padding:1rem;border-radius:.75rem}
    </style>
    <script type="module" src="./arcane/modules/HTMLImport.js?v=2"></script>
</head>
<body>
<main>
    <header><h1>Shared theme controls</h1><p>Switch the system appearance quickly or build a validated custom skin from shared tokens.</p></header>
    <div class="demo-bar"><strong>Example application</strong><html-import id="switcher" href="./arcane/components/theme-switcher.html?v=2"></html-import></div>
    <html-import id="editor" href="./arcane/components/theme-editor.html?v=1"></html-import>
    <p id="status" role="status" aria-live="polite"></p>
</main>
<script type="module">
    import ThemeManager from './arcane/modules/ThemeManager.js';
    const manager=new ThemeManager();
    const editor=document.querySelector('#editor');
    const status=document.querySelector('#status');
    editor.addEventListener('theme-preview',event=>manager.preview(event.detail.theme));
    editor.addEventListener('theme-save',async event=>{const state=await manager.saveCustom(event.detail.theme);status.textContent=`Using ${state.theme.name}.`;});
    editor.addEventListener('theme-reset',async()=>{await manager.resetCustom();status.textContent='Custom skin removed.';});
    await manager.load();
</script>
</body>
</html>
