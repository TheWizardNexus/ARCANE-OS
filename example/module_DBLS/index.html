<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>PreCrisis.AI Header Example</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />

        <base href="/" />

        <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./img/favicon.png" type="image/png">

        <!-- Styles -->
        <link rel="stylesheet" href="./css/layout.css">
        
        <script async type="module" src="./modules/DBLS.js"></script>

        <script async type="module" src="./modules/HTMLImport.js"></script>
        <script async type="module" src="./modules/Errors.js"></script>
    </head>

    <body>
        <html-import class="header" href="./components/header.html"></html-import>
        <html-import class="nav" href="./components/nav.html"></html-import>
        <html-import class="modal" href="./components/modal.html"></html-import>

        <script type="module">
            document.querySelector('.modal').addEventListener(
                'modal-ready',
                initExampleDBLS
            )


            if(window.dbls?.ready){
                initExampleDBLS();
            }else{
                window.addEventListener(
                    'dbls-ready',
                    initExampleDBLS
                );
            }
            
            async function initExampleDBLS(e){
                const modal=document.querySelector('.modal');
                if(!modal.ready){
                    return;
                }
                let example=window.dbls.getAll();
                
                modal.populate(
                    JSON.stringify(Object.keys(example),null,4)
                );
                console.log(example);
                modal.open();
            }
        </script>
    </body>
</html>
