<!DOCTYPE html>
<html lang="en">

	<head>
		<meta charset="utf-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
		<title>PreCrisis.AI Header Example</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="referrer" content="origin" />

		<base href="/" />

		<link rel="manifest" href="/apps/precrisis/manifest.json" crossorigin="use-credentials" />
		<link rel="icon" href="/apps/precrisis/img/favicon.png" type="image/png" />

		<!-- Styles -->
		<link rel="stylesheet" href="/arcane/css/layout.css" />

		<!-- Modules -->
		<script async type="module" src="/arcane/modules/AI.js"></script>

		<script async type="module" src="/arcane/modules/HTMLImport.js"></script>
        <script async type="module" src="/arcane/modules/Errors.js"></script>
		<script async type="module" src="/arcane/modules/Mail.js"></script>
	</head>

	<body>
        <html-import class="header" href="/arcane/components/header.html"></html-import>
        <html-import class="nav" href="/apps/precrisis/components/nav.html"></html-import>

		<main class="contents">
            <div>
                <input id="email-to" type="email" value="recipient@example.com" /> <br />
                <input id="email-subject" type="text" value="Test Notification" /> <br />
                <textarea id="email-notes" rows="4" cols="60"></textarea>
            </div>

			<button id="send-test">Send</button>

			<h2>Status</h2>
			<pre id="status"></pre>
		</main>

		<script type="module">
			const inputTo=document.querySelector('#email-to')
			const inputSubject=document.querySelector('#email-subject')
			const inputNotes=document.querySelector('#email-notes')
			const button=document.querySelector('#send-test')
			const status=document.querySelector('#status')

			async function sendTest(){
				status.textContent='Sending…'

				const to=[inputTo.value].filter(Boolean)
				const subject=inputSubject.value || 'Test Notification'
				const payload={
					notes:inputNotes.value,
				}

				try{
					const result=await mail.send(
						to,
						subject,
						payload,
						'',
						'report'
					)

					status.textContent=`Status: ${result.status}; ${result.reportKey}`

				}catch(err){
					console.warn(err)
					status.textContent='Error sending mail. See console for details.'
				}
			}

			button.addEventListener('click', sendTest)
		</script>
	</body>
</html>
