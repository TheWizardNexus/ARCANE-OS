<link rel="stylesheet" href="./arcane/css/layout.css?v=3">
<style>
    :host{
        display:block;
        height:100%;
        min-height:0;
    }

    .voice-transcription{
        display:grid;
        gap:1em;
        grid-template-rows:auto minmax(12em,1fr) auto auto;
        height:100%;
        min-height:0;
    }

    .transcript{
        background:var(--background);
        border:1px solid var(--border-color);
        border-radius:.5em;
        overflow:auto;
        padding:1em;
    }

    .transcript:empty::before{
        content:attr(data-empty-label);
        opacity:.55;
    }

    .controls{
        display:flex;
        flex-wrap:wrap;
        gap:.5em;
    }

    .controls button{
        margin:0;
    }

    .recording{
        color:var(--danger-color);
    }

    .description,
    .status{
        margin:0;
    }
</style>

<section class="voice-transcription">
    <p class="description">Record one or more segments. Each segment is transcribed after you press Stop.</p>
    <section id="transcript" class="transcript" aria-label="Voice transcription" data-empty-label="Your transcription will appear here after you stop recording."></section>
    <p id="status" class="status" aria-live="polite">Loading recorder...</p>
    <section class="controls">
        <button id="start" type="button" disabled>Start</button>
        <button id="stop" type="button" disabled>Stop</button>
        <button id="complete" type="button" disabled>Complete Transcription</button>
    </section>
</section>

<script type="module">
    const host=this;
    await import('../modules/AI.js?v=3');
    const {default:MD}=await import('../modules/MD.js?v=2');
    const transcriptElement=host.shadowRoot.querySelector('#transcript');
    const status=host.shadowRoot.querySelector('#status');
    const startButton=host.shadowRoot.querySelector('#start');
    const stopButton=host.shadowRoot.querySelector('#stop');
    const completeButton=host.shadowRoot.querySelector('#complete');

    let chunks=[];
    let mediaStream=null;
    let recorder=null;
    let state='idle';
    let transcript='';

    host.configure=configure;

    Object.defineProperty(
        host,
        'value',
        {
            get:()=>transcript
        }
    );

    startButton.addEventListener('click',startRecording);
    stopButton.addEventListener('click',stopRecording);
    completeButton.addEventListener('click',completeStream);

    function configure(options={}){
        if(!options||typeof options!=='object'){
            return false;
        }

        if(typeof options.description==='string'&&options.description){
            host.shadowRoot.querySelector('.description').innerText=options.description;
        }
        if(typeof options.transcriptionLabel==='string'&&options.transcriptionLabel){
            transcriptElement.setAttribute('aria-label',options.transcriptionLabel);
        }
        if(typeof options.emptyLabel==='string'&&options.emptyLabel){
            transcriptElement.dataset.emptyLabel=options.emptyLabel;
        }
        if(typeof options.completeLabel==='string'&&options.completeLabel){
            completeButton.innerText=options.completeLabel;
        }

        return true;
    }

    async function startRecording(){
        if(!['idle','error'].includes(state)){
            return false;
        }

        if(
            typeof MediaRecorder==='undefined'
            || !navigator.mediaDevices?.getUserMedia
        ){
            setState('error','Audio recording is not supported by this browser.');
            return false;
        }

        setState('starting','Requesting microphone access...');
        chunks=[];

        try{
            mediaStream=await navigator.mediaDevices.getUserMedia(
                {audio:true}
            );
            recorder=createRecorder(mediaStream);

            recorder.addEventListener('dataavailable',collectAudio);
            recorder.addEventListener('stop',finishRecording,{once:true});
            recorder.addEventListener('error',recordingError,{once:true});

            const tracks=mediaStream.getAudioTracks();

            for(let i=0;i<tracks.length;i++){
                tracks[i].addEventListener(
                    'ended',
                    recordingInterrupted,
                    {once:true}
                );
            }

            recorder.start();
            setState('recording','Recording...');
            return true;
        }catch(error){
            releaseMicrophone();
            setState('error','Unable to start recording. Check microphone permission and try again.');
            console.error('Unable to start recording:',error);
            return false;
        }
    }

    function createRecorder(stream){
        const candidates=[
            'audio/webm;codecs=opus',
            'audio/mp4',
            'audio/webm'
        ];

        for(let i=0;i<candidates.length;i++){
            if(MediaRecorder.isTypeSupported?.(candidates[i])){
                return new MediaRecorder(
                    stream,
                    {mimeType:candidates[i]}
                );
            }
        }

        return new MediaRecorder(stream);
    }

    function collectAudio(e){
        if(e.data?.size){
            chunks.push(e.data);
        }
    }

    function stopRecording(){
        if(state!=='recording'||recorder?.state!=='recording'){
            return false;
        }

        setState('transcribing','Transcribing this segment...');
        recorder.stop();
        return true;
    }

    async function finishRecording(){
        const mimeType=recorder?.mimeType||chunks[0]?.type||'audio/webm';
        const audio=new Blob(chunks,{type:mimeType});

        releaseMicrophone();

        if(!audio.size){
            setState('error','No audio was captured. Try recording again.');
            return false;
        }

        try{
            const file=new File(
                [audio],
                `audio.${fileExtension(mimeType)}`,
                {type:mimeType}
            );
            const segment=(await ai.fetchSTT(file)).trim();

            if(!segment){
                setState('idle','No speech was transcribed. You can try another segment.');
                return false;
            }

            transcript=transcript
                ?`${transcript}\n\n${segment}`
                :segment;
            renderTranscript();
            setState('saving','Saving transcription...');

            try{
                if(typeof host.save!=='function'){
                    throw new Error('Transcription saving is unavailable.');
                }

                await host.save(
                    {
                        transcript:transcript,
                        segment:segment
                    }
                );
            }catch(error){
                setState('error','Transcribed, but unable to save.');
                console.error('Unable to save transcription:',error);
                return false;
            }

            host.dispatchEvent(
                new CustomEvent(
                    'speech-transcription-complete',
                    {detail:{text:segment}}
                )
            );
            host.dispatchEvent(
                new CustomEvent(
                    'voice-transcription-segment',
                    {
                        bubbles:true,
                        composed:true,
                        detail:{text:segment}
                    }
                )
            );
            setState('idle','Transcription saved. Record another segment or complete.');
            return true;
        }catch(error){
            setState('error','Unable to transcribe this recording.');
            console.error('Unable to transcribe recording:',error);
            return false;
        }
    }

    function fileExtension(mimeType=''){
        if(mimeType.includes('mp4')){
            return 'm4a';
        }

        if(mimeType.includes('ogg')){
            return 'ogg';
        }

        return 'webm';
    }

    function recordingInterrupted(){
        if(state==='recording'){
            setState('transcribing','Recording ended. Transcribing captured audio...');

            if(recorder?.state==='recording'){
                recorder.stop();
            }
        }
    }

    function recordingError(e){
        setState('error','Recording was interrupted. Your completed transcription is still available.');
        releaseMicrophone();
        console.error('Audio recorder error:',e.error||e);
    }

    async function completeStream(){
        if(!transcript.trim()||!['idle','error'].includes(state)){
            return false;
        }

        if(typeof host.complete!=='function'){
            setState('error','Completion is unavailable.');
            return false;
        }

        setState('completing','Completing transcription...');

        try{
            await host.complete({transcript:transcript});
            setState('complete','Complete.');
            return true;
        }catch(error){
            setState('error','Unable to complete this transcription.');
            console.error('Unable to complete transcription:',error);
            return false;
        }
    }

    function renderTranscript(){
        transcriptElement.innerHTML=new MD(transcript).safeRendered;
    }

    function releaseMicrophone(){
        const tracks=mediaStream?.getTracks?.()||[];

        mediaStream=null;
        recorder=null;
        chunks=[];

        for(let i=0;i<tracks.length;i++){
            tracks[i].stop();
        }
    }

    function setState(nextState,message=''){
        state=nextState;
        status.innerText=message||nextState;
        status.classList.toggle('recording',state==='recording');

        startButton.disabled=!['idle','error'].includes(state);
        stopButton.disabled=state!=='recording';
        completeButton.disabled=!transcript.trim()
            || !['idle','error'].includes(state);
    }

    configure({
        completeLabel:host.dataset.completeLabel,
        description:host.dataset.description,
        emptyLabel:host.dataset.emptyLabel,
        transcriptionLabel:host.dataset.transcriptionLabel
    });
    renderTranscript();
    setState('idle','Ready.');
    host.ready=true;
    host.dispatchEvent(
        new CustomEvent(
            'voice-transcription-ready',
            {bubbles:true,composed:true}
        )
    );
</script>
