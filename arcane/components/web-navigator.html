<style>:host{display:block;height:100%;min-height:30rem}.navigator{display:grid;grid-template-rows:auto 1fr auto;height:100%;min-height:30rem}.toolbar{align-items:center;display:grid;gap:var(--arcane-space-2);grid-template-columns:auto minmax(0,1fr) auto;padding:var(--arcane-space-3);border-bottom:1px solid var(--arcane-border)}.history,.actions{display:flex;gap:var(--arcane-space-1)}button{min-width:2.5rem}.address{display:flex;gap:var(--arcane-space-2)}.address input{min-width:0;width:100%}iframe{width:100%;height:100%;min-height:24rem;border:0;background:var(--arcane-surface-raised)}.status{margin:0;padding:var(--arcane-space-2) var(--arcane-space-3);border-top:1px solid var(--arcane-border);color:var(--arcane-muted);font-size:.85rem}@media(max-width:42rem){.toolbar{grid-template-columns:1fr}.history,.actions{justify-content:center}}</style>
<section class="navigator arcane-card"><div class="toolbar"><div class="history"><button id="back" class="arcane-button arcane-button--tertiary" type="button" aria-label="Back">←</button><button id="forward" class="arcane-button arcane-button--tertiary" type="button" aria-label="Forward">→</button><button id="home" class="arcane-button arcane-button--tertiary" type="button" aria-label="Home">⌂</button></div><form id="addressForm" class="address"><label class="visually-hidden" for="address">Web address</label><input id="address" type="text" inputmode="url" autocomplete="off" spellcheck="false" placeholder="https://example.com"><button class="arcane-button" type="submit">Go</button></form><div class="actions"><button id="reload" class="arcane-button arcane-button--tertiary" type="button" aria-label="Reload">↻</button><button id="external" class="arcane-button arcane-button--secondary" type="button">Open externally</button></div></div><iframe id="frame" title="Web content" referrerpolicy="strict-origin-when-cross-origin" sandbox="allow-forms allow-popups allow-popups-to-escape-sandbox allow-scripts"></iframe><p id="status" class="status" role="status" aria-live="polite">Enter an address. Some sites block embedded viewing; use Open externally when needed.</p></section>
<script type="module">const host=this,root=host.shadowRoot,address=root.querySelector('#address'),frame=root.querySelector('#frame'),status=root.querySelector('#status'),back=root.querySelector('#back'),forward=root.querySelector('#forward');let homeUrl='https://example.com/',history=[],position=-1;
host.configure=options=>{if(options?.homeUrl)homeUrl=normalize(options.homeUrl);if(options?.initialUrl)navigate(options.initialUrl);else updateButtons();return host};host.navigate=navigate;host.currentUrl=()=>history[position]||'';
root.querySelector('#addressForm').addEventListener('submit',event=>{event.preventDefault();navigate(address.value)});root.querySelector('#home').addEventListener('click',()=>navigate(homeUrl));root.querySelector('#reload').addEventListener('click',()=>{if(frame.src){status.textContent='Reloading…';frame.src=frame.src}});root.querySelector('#external').addEventListener('click',()=>host.dispatchEvent(new CustomEvent('web-open-external',{bubbles:true,composed:true,detail:{url:host.currentUrl()||normalize(address.value||homeUrl)}})));back.addEventListener('click',()=>move(-1));forward.addEventListener('click',()=>move(1));frame.addEventListener('load',()=>{status.textContent='Loaded. If the page is blank, its site does not permit embedded viewing.'});
function normalize(value){let text=String(value||'').trim();if(!/^[a-z][a-z0-9+.-]*:/i.test(text))text=`https://${text}`;const url=new URL(text);if(!['http:','https:'].includes(url.protocol))throw new TypeError('Web addresses must use HTTP or HTTPS.');return url.href}
function navigate(value,{record=true}={}){try{const url=normalize(value);if(record){history=history.slice(0,position+1);history.push(url);position=history.length-1}address.value=url;frame.src=url;status.textContent='Loading…';updateButtons();host.dispatchEvent(new CustomEvent('web-navigate',{bubbles:true,composed:true,detail:{url}}));return url}catch(error){status.textContent=error.message;return ''}}
function move(amount){const next=position+amount;if(next<0||next>=history.length)return;position=next;navigate(history[position],{record:false})}function updateButtons(){back.disabled=position<=0;forward.disabled=position<0||position>=history.length-1}
updateButtons();host.ready=true;host.dispatchEvent(new CustomEvent('web-navigator-ready',{bubbles:true,composed:true}));</script>
