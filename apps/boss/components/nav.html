<style>
    :host {
        --boss-navy:#022241;
        --boss-gold:#E7AA3B;
        --boss-cream:#F7E5C6;
        display:block;
    }

    nav {
        box-sizing:border-box;
        min-height:5rem;
        padding:.55rem clamp(.65rem,2vw,1.35rem);
        gap:clamp(.65rem,2vw,1.5rem);
        position:relative;
        background:linear-gradient(125deg,var(--boss-navy),#073A60);
        border-bottom:.2rem solid var(--boss-gold);
        box-shadow:0 .5rem 1.4rem rgba(2,34,65,.24);
    }

    .logo-container {
        flex:0 1 15rem;
        min-width:8rem;
    }

    .brand-link {
        box-sizing:border-box;
        display:block;
        width:clamp(10rem,19vw,15rem);
        height:3.8rem;
        overflow:hidden;
        border:.08rem solid rgba(231,170,59,.68);
        border-radius:.65rem;
        background:#fff;
        box-shadow:0 .28rem .8rem rgba(0,0,0,.2);
        -webkit-app-region:no-drag;
        transition:transform 160ms,box-shadow 160ms;
    }

    .brand-link:hover {
        transform:translateY(-1px);
        box-shadow:0 .4rem 1rem rgba(0,0,0,.28);
    }

    .brand-link:focus-visible,
    nav>ul a:focus-visible {
        outline:.18rem solid var(--boss-gold);
        outline-offset:.16rem;
    }

    .logo {
        display:block;
        width:100%;
        height:100%;
        object-fit:cover;
        object-position:center;
        transform:scale(1.08);
    }

    nav>ul {
        list-style:none;
        padding:0;
        margin:0;
        min-width:0;
        flex:1 1 auto;
        display:flex;
        justify-content:flex-end;
        align-items:center;
        gap:clamp(.15rem,.65vw,.55rem);
    }

    nav>ul>li {
        margin:0;
    }

    nav>ul a {
        border:1px solid transparent;
        border-radius:.55rem;
        color:var(--boss-cream);
        display:block;
        padding:.65rem .72rem;
        font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
        font-size:.88rem;
        font-weight:700;
        letter-spacing:.025em;
        line-height:1;
        text-decoration:none;
        transition:background-color 180ms,color 180ms,border-color 180ms,transform 120ms;
    }

    nav>ul a:hover,
    nav>ul a[aria-current="page"] {
        background:var(--boss-gold);
        border-color:#F5D58E;
        color:var(--boss-navy);
    }

    nav>ul a:active {
        transform:translateY(1px);
    }

    nav aside {
        flex:0 0 auto;
        min-width:0;
        color:var(--boss-cream);
        font:600 .75rem/1.2 Inter,ui-sans-serif,sans-serif;
        text-align:center;
    }

    nav .icon {
        display:none;
        min-width:1.45rem;
        font-size:.68rem;
        font-weight:850;
        letter-spacing:.04em;
        text-align:center;
    }

    nav .label {
        display:inline;
    }

    @media (max-width:48em) {
        nav {
            min-height:4.4rem;
            gap:.45rem;
            padding:.45rem .55rem;
        }

        .logo-container {
            flex-basis:7.25rem;
            min-width:6.4rem;
        }

        .brand-link {
            width:7.25rem;
            height:3.35rem;
        }

        nav>ul a {
            padding:.62rem .45rem;
        }

        nav .label {
            display:none;
        }

        nav .icon {
            display:inline-block;
        }

        nav aside {
            display:none;
        }
    }

    @media (max-width:30em) {
        .logo-container {
            flex-basis:6rem;
            min-width:5.5rem;
        }

        .brand-link {
            width:6rem;
            height:3rem;
        }

        nav>ul {
            gap:.05rem;
        }

        nav>ul a {
            padding:.55rem .34rem;
        }
    }
</style>

<nav part="nav">
  <div class="logo-container">
    <a class="brand-link" href="./apps/boss/chat.html" aria-label="BOSS Libraries home">
      <img class="logo" src="./apps/boss/img/boss-libraries-logo-horizontal.png" alt="BOSS Libraries — Business Operator Solutions &amp; Services">
    </a>
  </div>
  <ul>
    <li>
      <a href="./apps/boss/chat.html" aria-label="BOSS Libraries AI Librarian">
        <span class="icon" aria-hidden="true">AI</span>
        <span class="label">Librarian</span>
      </a>
    </li>
    <li>
      <a href="./apps/boss/library.html" aria-label="BOSS Libraries documents">
        <span class="icon" aria-hidden="true">LB</span>
        <span class="label">Library</span>
      </a>
    </li>
    <li>
      <a href="./apps/boss/admin.html" aria-label="Profile settings">
        <span class="icon" aria-hidden="true">PR</span>
        <span class="label">Profile</span>
      </a>
    </li>
    <li>
      <a href="./apps/boss/export.html" aria-label="Export BOSS Libraries data">
        <span class="icon" aria-hidden="true">EX</span>
        <span class="label">Export</span>
      </a>
    </li>
    <li>
      <a href="./apps/boss/import.html" aria-label="Import BOSS Libraries data">
        <span class="icon" aria-hidden="true">IM</span>
        <span class="label">Import</span>
      </a>
    </li>
  </ul>
  <aside>
    <span id="AIReq"></span>
  </aside>
</nav>

<script type="module">
    const host=this;
    const shadowRoot=host.shadowRoot;
    const nav=shadowRoot.querySelector('nav');
    const currentPath=new URL(window.location.href).pathname;

    nav.querySelectorAll('ul a').forEach(
        link=>{
            if(new URL(link.href).pathname===currentPath){
                link.setAttribute('aria-current','page');
            }
        }
    );

    nav.addEventListener(
        'click',
        async (e)=>{
            if(e.target!==host){
                return;
            }

            nav.classList.toggle('mini')
        }
    )
</script>
