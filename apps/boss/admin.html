<!DOCTYPE html>
<html lang="en">
    <head>
        <base href="../../" />
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>BOSS Libraries | Profile</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />
        <meta name="description" content="Manage your BOSS Libraries profile, appearance, and AI settings." />
        <meta name="theme-color" content="#022241" />
        <link rel="manifest" href="./apps/boss/manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./apps/boss/img/boss-libraries-logo-stacked.png" type="image/png">
        

        <!-- Styles -->
        <link rel="stylesheet" href="./arcane/css/layout.css?v=3">
        <link rel="stylesheet" href="./apps/boss/boss.css?v=5">
        <style>
            body{
                grid-template-rows: auto auto 1fr;
            }

            main{
                grid-column:1 / -1;
            }

            section{
                padding:3em;
            }

            section.model-preference label {
                display: grid;
                grid-template-columns: 3em 1fr;
                padding-top: 2em;
            }

            section.model-select label {
                display: grid;
                padding-top: 2em;
            }

            section.voices label,
            section.color-table label{
                display: grid;
                grid-template-columns: 3em 6em 1fr;
                padding-top:2em;
            }

            section.model-preference, 
            section.model-select {
                padding-left: 0;
            }

            section.input-container {
                margin: 2em 0;
            }

            section.input-container label {
                display: block;
                margin-bottom: .5em;
                font-weight: bold;
            }

            textarea {
                height: 6em;
                resize: vertical;
            }

            .color-preview {
                display: flex;
                gap: 0.5em; /* Space between color boxes */
                align-items: center;
                justify-content: center; /* Center-align within the row */
                height: 1.5em; /* Match the height of the radio button */
            }

            .color-box {
                width: 1.5em; /* Match the width to the height */
                height: 1.5em; /* Square size for color boxes */
                border:1px solid var(--border-color);
                border-radius: 0.25em; /* Slightly rounded corners */
                box-shadow: 0 0 0.2em rgba(0, 0, 0, 0.2); /* Subtle shadow for depth */
            }

            #char-count {
                margin-top: 5px;
                font-size: 12px;
                color:var(--platinum);
            }

            input[type="radio"],
            input[type="checkbox"] {
                width: 1em;
                height: 1em;
                margin:.5em 1em .5em 0;
                padding:0;
                -webkit-appearance: none;
                -moz-appearance: none;
                appearance: none;
                background-color:var(--modal-background);
                border:2px solid var(--platinum);
                border-radius: 0;
                outline: none;
                cursor: pointer;
                position: relative;
            }
            input[type="radio"]:checked::before,
            input[type="checkbox"]:checked::before {
                content: "";
                width:.5em;
                height:.5em;
                background-color:var(--primary-color);
                position: absolute;
                top:.125em;
                left:.125em;
                border-radius: 0;
            }

            input[type="checkbox"]:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }

            audio {
                display: block;
                margin: 0;
                padding: 0;
                border: 0;
                width: 100%;
            }
            
            audio::-webkit-media-controls-enclosure {
              max-width: none
            }
            
            audio::-webkit-media-controls-panel {
              background-color: transparent
            }
            
            /* audio::-webkit-media-controls-play-button {

            } */
            
            audio::-webkit-media-controls-mute-button {
              -webkit-appearance: none;
            }
            
            
            audio::-webkit-media-controls-timeline-container,
            audio::-webkit-media-controls-current-time-display,
            audio::-webkit-media-controls-time-remaining-display {
                display:none;
            }
            
            label {
                font-size: 1.2em;
                cursor: pointer;
                display: flex;
                align-items: center;
            }
            
            textarea, input {
                width: calc(100% - 2em);
            }
            
            .input-animate {
                animation: greenFlash 0.3s;
            }
            
            @keyframes greenFlash {
                from { background-color: rgba(182, 247, 187, .1); }
                to { background-color: inherit; }
            }
            
            @media (max-width: 48em) {
                section {
                    padding: 0;
                }

                section.voices label, section.color-table label {
                    display: grid;
                    grid-template-columns: 1fr 2fr 3fr;
                    padding-top: 2em;
                }
                
                .color-preview {
                    gap: 0.1em;
                }
            }
        </style>
        
        <script type="module" src="./arcane/modules/Errors.js?v=2"></script>
        <script type="module" src="./arcane/entities/User.js"></script>

        <script type="module" src="./arcane/modules/DBOPFS.js"></script>
        <script type="module" src="./arcane/modules/DBLS.js"></script>
        <script type="module" src="./arcane/modules/HTMLImport.js?v=6"></script>
    </head>

                <label for="Preferred_model_provider">
                    <span>Preferred Language Model Provider</span>
                    <select id="Preferred_model_provider">
                        <option value="OPENAI">OPENAI</option>

            <script type="module">
                import UserEntity from './arcane/entities/User.js';

                const user=new UserEntity();

                window.addEventListener(
                    'user-entity-loaded',
                    populateUI
                );

                if (window.user?.ready) {
                    populateUI();
                }

                // Update data when input changes
                document.querySelector('main').addEventListener(
                    'input',
                    function(e){
                        e.target.classList.remove('input-animate');
                        void e.target.offsetWidth;
                        e.target.classList.add('input-animate');
                        
                        updateData();
                    }
                );

                async function isOllamaAvailableInRuntime() {
                    let ollamaAvailable = false;

                    // Check if local models are ready
                    try {
                        // Endpoint for local tts/stt server
                        const response = await fetch(
                            "http://127.0.0.1:8011/health",
                            {
                                method: "GET",
                                credentials: "omit",
                            }
                        );

                        if (!response.ok) {
                            return ollamaAvailable;
                        }

                        const data = await response.json();

                        ollamaAvailable = (data.available === true);
                    }
                    catch {}

                    return ollamaAvailable;
                }

                async function updateData() {
                    let selectedModels=[];// get some selects from the UI which you populate from the available models from AI

                    // Get list of model proviiders and preferences from UI
                    const preferredModelElements = document.querySelectorAll("section#Model_preferences select");
                    selectedModels = Array.from(preferredModelElements, elem => elem.value);

                    user.explicit={
                        username: username.value || '',
                        email: email.value || '',
                        phone: phone.value || '',
                        license_key: license_key.value || '',
                        AI_voice: document.querySelector('[name="audio"]:checked')?.value || '',
                        skin: document.querySelector('[name="theme"]:checked')?.value || 'default', // Save selected skin
                        developer:document.getElementById('developer').checked,
                        preferredModels:selectedModels
                    }

                    // Apply the selected skin live
                    const selectedSkin = document.querySelector('[name="theme"]:checked')?.value || 'default';
                    document.body.className = selectedSkin; // Update body class
                }

                async function populateUI() {

                    username.value = user.username || '';
                    email.value = user.email || '';
                    phone.value = user.phone || '';
                    license_key.value = user.license_key || '';

                    // Need preferred models so it gets populated in multiple check boxes
                    const preferredModelElements = document.querySelectorAll("section#Model_preferences select");
                    preferredModelElements.forEach((elem, i) => elem.value = user.explicit.preferredModels[i]);


                    const defaultVoice = 'alloy';
                    const desiredVoice = String(user.AI_voice || defaultVoice);
                    const selectedVoice = document.querySelector(`input[name="audio"][value="${desiredVoice}"]`)
                        || document.querySelector(`input[name="audio"][value="${defaultVoice}"]`);
                    if (selectedVoice) {
                        selectedVoice.checked = true;
                    }
                    
                    // Set the selected skin
                    const defaultSkin = 'default';
                    const skinValue = user.skin || defaultSkin;
                    const skinCheckbox = document.querySelector(`[name="theme"][value="${skinValue}"]`);
                    if (skinCheckbox) {
                        skinCheckbox.checked = true;
                    }
                    document.body.className = skinValue; // Apply the skin to body

                    // Developer mode checkbox
                    document.getElementById('developer').checked = user.developer;
                }

            </script>

</html>
