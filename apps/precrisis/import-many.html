<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <base href="../../">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>PreCrisis.AI Dashboard</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />
        <link rel="manifest" href="./apps/precrisis/manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./apps/precrisis/img/favicon.png" type="image/png">

        <link rel="stylesheet" href="./arcane/css/layout.css?v=3">
        <link rel="stylesheet" href="./arcane/css/theme.css?v=1">

        <script type="module" src="./arcane/modules/ThemeBootstrap.js?v=1"></script>
        <script type="module" src="./arcane/modules/Errors.js?v=2"></script>
        <script type="module" src="./arcane/modules/DBOPFS.js"></script>
        <script type="module" src="./arcane/modules/HTMLImport.js?v=2"></script>
        <script defer src="./arcane/modules/QRCode.min.js"></script>

        <style>

            #dropZone{
                border:2px dashed var(--border-color);
                border-radius:0.75em;
                padding:2em;
                text-align:center;
                cursor:pointer;
                transition:
                    border-color 200ms,
                    background 200ms,
                    transform 150ms,
                    box-shadow 200ms;
            }

            input,#fileInput,#fileInput::file-selector-button{
                cursor:pointer;
            }

            #dropZone:hover{
                border-color:var(--primary-color);
            }

            #dropZone.dragover{
                border-color:var(--secondary-color);
                background:var(--modal-background);
                box-shadow:0 0 0.6em var(--secondary-color);
                transform:scale(1.02);
            }

            #dropZone.loading{
                opacity:0.6;
                pointer-events:none;
            }

            #dropZone.success{
                border-color:var(--secondary-color);
                box-shadow:0 0 0.8em var(--secondary-color);
            }

            #dropZone.error{
                border-color:var(--accent-color);
                box-shadow:0 0 0.8em var(--accent-color);
            }

            #importStatus{
                margin-top:1em;
                padding:0.75em 1em;
                border-radius:0.5em;
                border:1px solid var(--border-color);
                background:var(--modal-background);
                color:var(--text-color);
                transition:opacity 200ms;
            }

            #importStatus.success{
                border-color:var(--secondary-color);
                box-shadow:0 0 0.4em var(--secondary-color);
            }

            #importStatus.error{
                border-color:var(--accent-color);
                box-shadow:0 0 0.4em var(--accent-color);
            }

            #importStatus.loading{
                border-color:var(--primary-color);
            }

        </style>
    </head>

    <body>

        <html-import class="header" href="./arcane/components/header.html?v=3"></html-import>
        <html-import class="nav" href="./apps/precrisis/components/nav.html?v=5"></html-import>

        <main class="contents">

            <div id="dropZone">
                <h1>Import Multiple Users or A Single User</h1>
                <p>Into your user base.</p>
                <p>Drag & drop your <strong>VLL_Scores.json</strong> files here<br>or</p>
                <input type="file" id="fileInput" multiple accept="image/png">
            </div>

            <div id="importStatus" class="hidden"></div>

        </main>

        <script type="module">

            const zone=document.querySelector('#dropZone');

            const input=document.querySelector('#fileInput');

            input.addEventListener(
                'change',
                function(e){
                    if(e.target.files.length){
                        handleFiles(e.target.files);
                    }
                }
            );

            ['dragenter','dragover'].forEach(
                function(evt){
                    zone.addEventListener(
                        evt,
                        function(e){
                            e.preventDefault();
                            zone.classList.add('dragover');
                        }
                    );
                }
            );

            ['dragleave','drop'].forEach(
                function(evt){
                    zone.addEventListener(
                        evt,
                        function(e){
                            e.preventDefault();
                            zone.classList.remove('dragover');
                        }
                    );
                }
            );

            zone.addEventListener(
                'click',
                function(e){
                    if(e.target.tagName.toLowerCase()!=='input'){
                        input.click();
                    }
                }
            );

            zone.addEventListener(
                'drop',
                function(e){

                    const files=e.dataTransfer.files;

                    if(files.length){
                        handleFiles(files);
                    }
                }
            );

            async function handleFiles(fileList){

                zone.classList.remove(
                    'success',
                    'error'
                );

                zone.classList.add('loading');

                setStatus(
                    `Processing ${fileList.length} file(s)…`,
                    'loading'
                );

                try{

                    let processed=0;

                    for(const file of fileList){

                        setStatus(
                            `Importing ${file.name} (${processed+1}/${fileList.length})`,
                            'loading'
                        );

                        await dbopfs.restoreFromPNG(file);

                        processed++;
                    }

                    setStatus(
                        `Imported ${processed} backup file(s).`,
                        'success'
                    );

                    zone.classList.remove('loading');
                    zone.classList.add('success');

                }
                catch(err){

                    console.error(err);

                    setStatus(
                        'Import failed: '+err.message,
                        'error'
                    );

                    zone.classList.remove('loading');
                    zone.classList.add('error');
                }
            }

            function setStatus(message,type='loading'){

                const el=document.querySelector('#importStatus');

                el.textContent=message;

                el.className=type;
                el.id='importStatus';

                el.classList.remove('hidden');

                if(type==='success'){
                    setTimeout(
                        function(){
                            el.classList.add('hidden');
                            zone.classList.remove('success');
                        },
                        4000
                    );
                }
            }

        </script>

    </body>
</html>
