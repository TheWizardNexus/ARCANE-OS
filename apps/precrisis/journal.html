<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>PreCrisis.AI Journal</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />
        <link rel="manifest" href="manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./img/favicon.png" type="image/png">

        <link rel="stylesheet" href="./css/layout.css?v=3">

        <script type="module" src="./modules/Errors.js?v=2"></script>
        <script type="module" src="./modules/DBOPFS.js"></script>
        <script type="module" src="./modules/AI.js?v=3"></script>
        <script type="module" src="./modules/HTMLImport.js?v=2"></script>
    </head>

    <body>
        <html-import class="header" href="./components/header.html?v=3"></html-import>
        <html-import class="nav" href="./components/nav.html?v=5"></html-import>

        <main class="contents data-chat">
            <html-import
                id="journalDataView"
                class="data-view"
                data-button="View Journal Entries"
                data-title="Journal Entries"
                data-dirs="journal_entries"
                href="./components/data-view.html?v=4"
            ></html-import>
            <html-import
                id="journalEditor"
                class="markdown-editor data-workspace"
                href="./components/markdown-editor.html?v=6"
            ></html-import>
        </main>
        <html-import id="progressModal" class="modal" href="./components/modal.html?v=11"></html-import>
        <html-import id="modal" class="modal" href="./components/modal.html?v=11"></html-import>
    </body>

    <script type="module">
        import Journal from './entities/Journal.js';
        import UserEntity from './entities/User.js';
        import createPostSaveAssessment from './modules/PostSaveAssessmentUI.js';

        const user=new UserEntity();
        const journalDataView=document.querySelector('#journalDataView');
        const journalEditor=document.querySelector('#journalEditor');
        const progressModal=document.querySelector('#progressModal');
        const modal=document.querySelector('#modal');
        const assessment=createPostSaveAssessment(progressModal,modal);

        let journalSavePromise=Promise.resolve();

        journalDataView.beforeOpen=()=>journalSavePromise;
        journalEditor.save=saveJournalEntry;
        journalEditor.dataset.configured='true';

        async function saveJournalEntry(entry={}){
            const markdown=entry.markdown||'';
            const title=entry.title||createTitle(markdown);
            const journal=new Journal();

            journalSavePromise=journal.save(
                {
                    date:new Date().toISOString(),
                    title:title,
                    entry:markdown,
                    user:user.username||''
                }
            );

            const saved=await journalSavePromise;

            assessment.run(
                markdown,
                {
                    title:title,
                    source:'journal entry',
                    username:user.username||''
                }
            ).catch(
                error=>console.error('Unable to assess journal entry:',error)
            );

            return saved;
        }

        function createTitle(markdown=''){
            const firstLine=markdown.split(/\r?\n/).find(
                line=>line.trim()
            )||'Journal Entry';

            return firstLine
                .replace(/^#+\s*/,'')
                .replace(/[*_~`]/g,'')
                .trim()
                .slice(0,80)||'Journal Entry';
        }
    </script>

</html>
