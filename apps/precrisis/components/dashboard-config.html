<link rel="stylesheet" href="./css/layout.css?v=3">
<link rel="stylesheet" href="./css/dashboard-config.css?v=1">
<style>
    :host{
        display:block;
    }

</style>

<button id="openConfig" type="button" aria-haspopup="dialog" disabled>Configure Dashboard</button>
<html-import id="configModal" class="modal" href="./components/modal.html?v=11"></html-import>

<script type="module">
    import('../entities/User.js');

    const host=this;
    const {dashboardCharts}=await import('../modules/DashboardCharts.js');
    const {default:waitForComponent}=await import('../modules/WaitForComponent.js');
    const openButton=host.shadowRoot.querySelector('#openConfig');
    const configModal=host.shadowRoot.querySelector('#configModal');

    let content=null;
    let initialized=false;

    host.open=openConfig;

    openButton.addEventListener(
        'click',
        ()=>openConfig().catch(
            error=>console.error('Unable to configure dashboard:',error)
        )
    );

    configModal.addEventListener(
        'modal-closed',
        ()=>host.dispatchEvent(
            new CustomEvent('dashboard-config-closed')
        )
    );

    window.addEventListener(
        'user-entity-loaded',
        init,
        {once:true}
    );

    if(window.user?.ready){
        init();
    }

    async function openConfig(){
        const user=await waitForUser();
        const modal=await waitForComponent(
            configModal,
            {
                methods:['populate','open'],
                property:'ready',
                event:'modal-ready'
            }
        );

        if(!content){
            content=createContent();
            await modal.populate(content,false);
        }

        syncOptions(user.dashboard.charts);
        modal.open();
    }

    function createContent(){
        const section=document.createElement('section');
        const styles=document.createElement('link');
        const heading=document.createElement('h1');
        const message=document.createElement('p');
        const options=document.createElement('section');

        styles.rel='stylesheet';
        styles.href='./css/dashboard-config.css?v=1';
        heading.innerText='Configure Dashboard';
        message.innerText='Choose which charts appear on your dashboard. Changes save automatically.';
        options.className='chart-options';
        options.addEventListener('change',changeVisibility);

        for(let i=0;i<dashboardCharts.length;i++){
            const chart=dashboardCharts[i];
            const label=document.createElement('label');
            const checkbox=document.createElement('input');
            const title=document.createElement('h3');
            const description=document.createElement('p');

            label.className='chart-option';
            checkbox.type='checkbox';
            checkbox.dataset.chartKey=chart.key;
            title.innerText=chart.title;
            description.innerText=chart.description;

            label.append(checkbox,title,description);
            options.append(label);
        }

        section.append(styles,heading,message,options);
        return section;
    }

    function syncOptions(charts={}){
        if(!content){
            return;
        }

        content.querySelectorAll('[data-chart-key]').forEach(
            checkbox=>checkbox.checked=charts[checkbox.dataset.chartKey]!==false
        );
    }

    function changeVisibility(e){
        const checkbox=e.target.closest('[data-chart-key]');

        if(!checkbox||!window.user?.ready){
            return;
        }

        const dashboard=window.user.dashboard;
        dashboard.charts[checkbox.dataset.chartKey]=checkbox.checked;
        window.user.dashboard=dashboard;

        host.dispatchEvent(
            new CustomEvent(
                'dashboard-config-change',
                {
                    detail:{
                        key:checkbox.dataset.chartKey,
                        visible:checkbox.checked
                    }
                }
            )
        );
    }

    function waitForUser(){
        if(window.user?.ready){
            return Promise.resolve(window.user);
        }

        return new Promise(
            resolve=>window.addEventListener(
                'user-entity-loaded',
                ()=>resolve(window.user),
                {once:true}
            )
        );
    }

    function init(){
        if(initialized){
            return;
        }

        initialized=true;
        openButton.disabled=false;
        host.ready=true;
        host.dispatchEvent(
            new CustomEvent('dashboard-config-ready')
        );
    }
</script>
