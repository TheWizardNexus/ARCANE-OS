<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="utf-8">
        <base href="../../">
        <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
        <title>PreCrisis.AI Stream of Consciousness</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="referrer" content="origin" />
        <link rel="manifest" href="./apps/precrisis/manifest.json" crossorigin="use-credentials" />
        <link rel="icon" href="./apps/precrisis/img/favicon.png" type="image/png">

        <link rel="stylesheet" href="./arcane/css/layout.css?v=3">

        <script type="module" src="./arcane/modules/Errors.js?v=2"></script>
        <script type="module" src="./arcane/modules/DBOPFS.js"></script>
        <script type="module" src="./arcane/modules/AI.js?v=3"></script>
        <script type="module" src="./arcane/modules/HTMLImport.js?v=2"></script>
    </head>

    <body>
        <html-import class="header" href="./arcane/components/header.html?v=3"></html-import>
        <html-import class="nav" href="./apps/precrisis/components/nav.html?v=5"></html-import>

        <main class="contents data-chat">
            <html-import
                id="streamDataView"
                class="data-view"
                data-button="View Streams of Consciousness"
                data-title="Streams of Consciousness"
                data-dirs="streams_of_consciousness"
                href="./arcane/components/data-view.html?v=4"
            ></html-import>
            <html-import
                id="voiceTranscription"
                class="voice-transcription data-workspace"
                data-transcription-label="Stream of Consciousness transcription"
                data-complete-label="Complete &amp; Generate Reports"
                href="./arcane/components/voice-transcription.html?v=8"
            ></html-import>
        </main>
        <html-import id="progressModal" class="modal" href="./arcane/components/modal.html?v=11"></html-import>
        <html-import id="modal" class="modal" href="./arcane/components/modal.html?v=11"></html-import>
    </body>

    <script type="module">
        import StreamOfConsciousness from './apps/precrisis/entities/StreamOfConsciousness.js';
        import UserEntity from './arcane/entities/User.js';
        import createPostSaveAssessment from './apps/precrisis/modules/PostSaveAssessmentUI.js';

        const user=new UserEntity();
        const stream=new StreamOfConsciousness();
        const streamDataView=document.querySelector('#streamDataView');
        const voiceTranscription=document.querySelector('#voiceTranscription');
        const progressModal=document.querySelector('#progressModal');
        const modal=document.querySelector('#modal');
        const assessment=createPostSaveAssessment(progressModal,modal);
        const sessionDate=new Date().toISOString();

        let streamSavePromise=Promise.resolve();

        streamDataView.beforeOpen=()=>streamSavePromise;
        voiceTranscription.save=saveTranscription;
        voiceTranscription.complete=completeStream;
        voiceTranscription.dataset.configured='true';

        function saveTranscription(data={}){
            const transcript=data.transcript||'';
            const title=createTitle(transcript);

            streamSavePromise=streamSavePromise.catch(
                ()=>{}
            ).then(
                ()=>stream.save(
                    {
                        date:sessionDate,
                        title:title,
                        entry:transcript,
                        user:user.username||''
                    }
                )
            );

            return streamSavePromise;
        }

        async function completeStream(data={}){
            const transcript=data.transcript||'';
            const title=createTitle(transcript);

            await streamSavePromise;

            assessment.run(
                transcript,
                {
                    title:title,
                    source:'stream of consciousness',
                    username:user.username||''
                }
            ).catch(
                error=>console.error('Unable to assess stream of consciousness:',error)
            );

            return stream;
        }

        function createTitle(transcript=''){
            const firstLine=transcript.split(/\r?\n/).find(
                line=>line.trim()
            )||'Stream of Consciousness';

            return firstLine.trim().slice(0,80)||'Stream of Consciousness';
        }
    </script>

</html>
