<!doctype html><html lang="en"><head><meta charset="utf-8"><base href="../../"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="theme-color" content="rgb(23, 34, 56)"><title>Arcane Weather</title><link rel="manifest" href="./apps/weather/manifest.json"><link rel="icon" href="./apps/weather/img/icon.png" type="image/png"><link rel="stylesheet" href="./arcane/css/theme.css?v=1"><link rel="stylesheet" href="./arcane/css/primitives.css?v=1"><link rel="stylesheet" href="./arcane/css/utility-workspace.css?v=1"><link rel="stylesheet" href="./apps/weather/weather.css?v=1"><script type="module" src="./arcane/modules/ThemeBootstrap.js?v=1"></script><script type="module" src="./arcane/modules/Errors.js?v=2"></script><script type="module" src="./arcane/modules/HTMLImport.js?v=6"></script></head><body><html-import class="app-bar" data-product-name="Weather" data-brand-mark="☀" data-status="Location entered by you" data-status-tone="success" href="./arcane/components/app-bar.html?v=2"><html-import slot="trailing" class="theme-switcher" href="./arcane/components/theme-switcher.html?v=2"></html-import></html-import><main class="utility-shell"><header class="utility-heading"><div><p class="eyebrow">Forecast</p><h1>Weather</h1><p>Search a city or postal code. Arcane does not request your precise device location.</p></div></header><section class="weather-search arcane-card"><form id="locationSearch" class="arcane-card__body search-row"><label class="arcane-field"><span>City or postal code</span><input id="locationQuery" required minlength="2" autocomplete="postal-code" placeholder="Chicago or 60601"></label><label class="arcane-field units"><span>Units</span><select id="units"><option value="fahrenheit">Fahrenheit</option><option value="celsius">Celsius</option></select></label><button class="arcane-button" type="submit">Search</button></form><div id="locations" class="location-results" aria-label="Location results"></div><p id="weatherStatus" class="arcane-card__footer weather-status" role="status" aria-live="polite">Enter a location to begin.</p></section><html-import id="weatherWidget" class="utility-stage" href="./arcane/components/weather-widget.html?v=1"></html-import><details class="arcane-card endpoint-settings"><summary>Weather data endpoints</summary><form id="endpointForm" class="arcane-card__body arcane-form-grid"><label class="arcane-field"><span>Geocoding endpoint</span><input id="geocodingEndpoint" type="url" required></label><label class="arcane-field"><span>Forecast endpoint</span><input id="forecastEndpoint" type="url" required></label><button class="arcane-button arcane-button--secondary" type="submit">Apply endpoints</button></form></details></main><script type="module" src="./apps/weather/modules/WeatherApp.js?v=1"></script></body></html>
